# Google Cloud Run Environment Configuration
# Spring profile: prod

# GCS Storage Provider
app.storage.provider=cloud
gcp.bucket.id=${GCP_BUCKET_ID:numisfera-images-prod}

# Cloud SQL MySQL Database
spring.datasource.url=jdbc:mysql:///${CLOUDSQL_DATABASE}?cloudSqlInstance=${CLOUDSQL_INSTANCE}&socketFactory=com.google.cloud.sql.mysql.SocketFactory
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate settings for production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Settings
app.jwtSecret=${JWT_SECRET_KEY}
app.jwtExpirationMs=86400000

# CORS Setting for Cloud deployment
app.cors.allowedOrigins=https://numisfera.mx,https://www.numisfera.mx,http://numisfera.mx,http://www.numisfera.mx,https://numisfera-app-suv6yotrza-uc.a.run.app
